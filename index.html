<!DOCTYPE html>
<html lang="en">

<head>

                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Collapsible content -->
            <div class="collapse navbar-collapse" id="navbarContent">

                <!-- Nav links --> 
                <!-- !!!! Make setActive() to highlight it and have underline when active--> 
                <ul class="navbar-nav mx-auto align-items-center gap-1">
                    <li class="nav-item">
                        <a class="nav-link" href="#"
                            onclick="changeContent('home.html'); setActive(this); return false;">

                    </li>

                            Account
                        </a>
                    </li>
                </ul>

                <div class="searchBar me-3">
                    <input id="searchInput" type="text" placeholder="Search...">
                    <button id="srchBtn" onclick="search()" aria-label="Search">🔍</button>
                </div>

                <!-- User icon on the far right -->
                <div class="userIcon" onclick="changeContent('account.html')" title="Account">👤</div>

            </div>
        </div>
    </nav>
