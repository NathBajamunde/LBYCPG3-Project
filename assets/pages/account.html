<!DOCTYPE html>
<html lang="en">

<head>
    <title>Logic Gates</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="assets/images/fulladder.png">
</head>

<body>
    <!-- ACCOUNT BANNER SECTION -->
    <section class="home-logicgates account-banner">
        <div class="welcome-box">
            <img src="assets/images/logo.png" alt="Digital Lab Logo" class="home-logo">
            <h1 class="page-title">Account</h1>
        </div>
    </section>

    <!-- ACCOUNT PROFILE SECTION -->
    <section class="info-section account-section">
        <div class="container">

            <!-- Profile Card -->
            <div class="account-profile-card">
                <div class="account-avatar">
                    👤
                </div>
                <div class="account-name-badge">
                    <span class="account-name">Name</span>
                </div>
            </div>

            <!-- History Table -->
            <div class="account-history mt-5">
                <h3 class="account-history-title">History</h3>
                <div class="table-responsive mt-3">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>Activity</th>
                                <th>Topic</th>
                                <th>Score</th>
                            </tr>
                        </thead>
                        <tbody id="accountHistoryBody">
                            <tr>
                                <td colspan="3" class="text-center text-muted py-4">No history yet.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </section>
</body>
